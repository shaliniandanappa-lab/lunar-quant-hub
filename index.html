<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Institutional 7-Strategy Quantitative Hub</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INST_DATABASE = {
            'CGPOWER': { price: 929.95, altman: 3.42, debt: 0.15, roe: 18.2, atr: 22.4 },
            'APARINDS': { price: 14123.00, altman: 4.15, debt: 0.22, roe: 24.5, atr: 320.0 },
            'GVT&D': { price: 4700.80, altman: 5.20, debt: 0.02, roe: 19.4, atr: 112.5 },
            'DIXON': { price: 12450.00, altman: 4.50, debt: 0.42, roe: 22.5, atr: 285.0 },
            'CRISIL': { price: 5120.00, altman: 3.80, debt: 0.00, roe: 24.2, atr: 95.0 }
        };

        function QuantHub() {
            const [portfolioCapital] = useState(100000);
            const [inputText, setInputText] = useState("CGPOWER\nAPARINDS\nDIXON");
            const [selectedStrategy] = useState("PROMOTION");
            const [results, setResults] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);

            const processEngine = () => {
                setIsProcessing(true);
                setTimeout(() => {
                    const symbols = inputText.split('\n').filter(s => s.trim());
                    const output = symbols.map(sym => {
                        const profile = INST_DATABASE[sym.trim()] || { price: 0, atr: 0 };
                        return { symbol: sym, status: 'BUY', quantity: 1, targetPrice: '0', stopLoss: '0', reason: 'Analysis ready' };
                    });
                    setResults(output);
                    setIsProcessing(false);
                }, 500);
            };

            return (
                <div className="p-6 max-w-4xl mx-auto">
                    <h1 className="text-3xl font-bold mb-6 text-center">Institutional Quantitative Hub</h1>
                    <div className="bg-slate-800 p-6 rounded shadow-lg mb-6">
                        <textarea 
                            className="w-full h-32 p-2 bg-slate-900 border border-slate-700 rounded text-white"
                            value={inputText}
                            onChange={(e) => setInputText(e.target.value)}
                        />
                        <button 
                            onClick={processEngine}
                            className="mt-4 w-full bg-blue-600 hover:bg-blue-500 py-2 rounded font-bold"
                        >
                            {isProcessing ? 'Processing...' : 'Run Quantitative Analysis'}
                        </button>
                    </div>
                    <div className="grid gap-4">
                        {results.map((r, i) => (
                            <div key={i} className="p-4 bg-slate-900 rounded border border-slate-700">
                                <span className="font-bold text-xl">{r.symbol}</span> - Status: {r.status}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuantHub />);
    </script>
</body>
</html>

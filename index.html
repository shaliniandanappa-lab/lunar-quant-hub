<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Institutional 7-Strategy Quantitative Hub</title>
    <!-- Core External Engine Modules Sourced via Direct Links -->

    <script src="https://cloudflare.com" crossorigin></script>
    <script src="https://cloudflare.com" crossorigin></script>
    <script src="https://cloudflare.com" crossorigin></script>
    <script src="https://tailwindcss.com"></script>
    
    
    
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INST_DATABASE = {
            'CGPOWER': { price: 929.95, altman: 3.42, debt: 0.15, roe: 18.2, atr: 22.4 },
            'APARINDS': { price: 14123.00, altman: 4.15, debt: 0.22, roe: 24.5, atr: 320.0 },
            'GVT&D': { price: 4700.80, altman: 5.20, debt: 0.02, roe: 19.4, atr: 112.5 },
            'DIXON': { price: 12450.00, altman: 4.50, debt: 0.42, roe: 22.5, atr: 285.0 },
            'CRISIL': { price: 5120.00, altman: 3.80, debt: 0.00, roe: 24.2, atr: 95.0 },
            'KALYANKJIL': { price: 585.00, altman: 2.10, debt: 0.65, roe: 14.8, atr: 16.5 },
            'SCHAEFFLER': { price: 3920.00, altman: 4.10, debt: 0.05, roe: 16.1, atr: 78.0 },
            'GABRIEL': { price: 1362.40, altman: 2.95, debt: 0.12, roe: 12.7, atr: 35.0 },
            'EIHOTEL': { price: 338.45, altman: 2.80, debt: 0.35, roe: 14.5, atr: 9.8 },
            'AEGISLOG': { price: 785.00, altman: 3.10, debt: 0.40, roe: 15.2, atr: 21.0 },
            'THERMAX': { price: 4554.00, altman: 3.65, debt: 0.18, roe: 13.8, atr: 105.0 },
            'KPITTECH': { price: 1640.00, altman: 4.25, debt: 0.11, roe: 21.0, atr: 42.0 },
            'TATACOMM': { price: 1910.00, altman: 2.45, debt: 0.95, roe: 17.4, atr: 48.0 },
            'RADICO': { price: 1820.00, altman: 2.60, debt: 0.48, roe: 12.5, atr: 38.5 },
            'DCXINDIA': { price: 193.68, altman: 1.45, debt: 1.10, roe: -0.53, atr: 6.2 },
            'FACT': { price: 715.00, altman: 1.15, debt: 1.85, roe: 8.5, atr: 24.0 },
            'NFL': { price: 105.00, altman: 1.02, debt: 2.10, roe: 4.1, atr: 3.8 },
            'JPPOWER': { price: 18.50, altman: 0.95, debt: 2.40, roe: 3.2, atr: 0.8 },
            'OLA': { price: 92.00, altman: 1.20, debt: 1.35, roe: -18.4, atr: 3.5 },
            'SWIGGY': { price: 270.80, altman: 1.35, debt: 0.10, roe: -35.6, atr: 9.5 },
            'NYKAA': { price: 165.00, altman: 2.15, debt: 0.25, roe: 3.4, atr: 5.2 },
            'IDEA': { price: 8.50, altman: 0.45, debt: 8.20, roe: -42.0, atr: 0.4 },
            'GROWW': { price: 216.00, altman: 1.55, debt: 1.95, roe: 5.2, atr: 7.5 }
        };

        const STRATEGIES = {
            'PROMOTION': { name: '1. Index Promotion Play', timeframe: '3-4 Weeks', desc: 'Front-runs passive fund inflows. Exit 24-hours before rebalancing day.' },
            'DEMOTION': { name: '2. Index Demotion Play', timeframe: '5-10 Days', desc: 'Mean-reversion bounce. Enter on Day 1 morning VWAP cross.' },
            'INCLUSION': { name: '3. Nifty 50 Inclusion Front-Run', timeframe: '3 Weeks', desc: 'Captures index promotion inflows. Require volume >5x ADTV.' },
            'PEAD': { name: '4. Post-Earnings Drift (PEAD)', timeframe: '10-20 Days', desc: 'Rides institutional accumulation. Trail with 1-Hour Supertrend (7,2).' },
            'FO_BAN': { name: '5. F&O Ban Mean-Reversion', timeframe: '3-5 Days', desc: 'Buys panic speculator liquidations. Exit on ban removal open.' },
            'AMAVASYA': { name: '6. Amavasya Volatility Squeeze', timeframe: '5-12 Days', desc: 'Uses strict 3% Bollinger Band compression. Set GTT OCO orders.' },
            'PUSHYA': { name: '7. Pushya Institutional Drift', timeframe: '2-5 Days', desc: 'Tracks high-delivery steady velocity. Buy VWAP/5-EMA pullbacks.' }
        };
        function QuantHub() {
            const [portfolioCapital, setPortfolioCapital] = useState(100000);
            const [singleAssetCapPct, setSingleAssetCapPct] = useState(20);
            const [globalRiskPct, setGlobalRiskPct] = useState(1);
            const [targetRewardMultiplier, setTargetRewardMultiplier] = useState(2.5);

            const [inputText, setInputText] = useState("CGPOWER\nAPARINDS\nGVT&D\nFACT\nSWIGGY\nDIXON");
            const [selectedStrategy, setSelectedStrategy] = useState("PROMOTION");
            const [results, setResults] = useState([]);
            const [customTicker, setCustomTicker] = useState({ symbol: '', price: '', altman: '', debt: '', roe: '', atr: '' });
            const [isProcessing, setIsProcessing] = useState(false);

            useEffect(() => {
                processEngine();
            }, [portfolioCapital, singleAssetCapPct, globalRiskPct, targetRewardMultiplier, selectedStrategy]);

            const parseAndExtractSymbols = (text) => {
                const rawTokens = text.toUpperCase().match(/[A-Z&]+/g) || [];
                const exclusions = new Set(['VOLUME', 'WATCH', 'LTP', 'NSE', 'BUY', 'SELL', 'WATCHLIST', 'PICK', 'FAILS', 'METRICS', 'BREAKOUT', 'SETUP', 'DROP', 'TARGET', 'HIT']);
                return Array.from(new Set(rawTokens.filter(t => !exclusions.has(t) && t.length >= 3)));
            };
            const processEngine = () => {
                setIsProcessing(true);
                const maxRupeeRisk = portfolioCapital * (globalRiskPct / 100);
                const maxCapitalCap = portfolioCapital * (singleAssetCapPct / 100);
                const symbols = parseAndExtractSymbols(inputText);
                
                const output = symbols.map(sym => {
                    const profile = INST_DATABASE[sym];
                    if (!profile) {
                        return {
                            symbol: sym, status: 'MANUAL_REQUIRED',
                            price: '-', altman: '-', debt: '-', roe: '-', quantity: '-', targetPrice: '-', stopLoss: '-',
                            reason: 'Ticker not found in database. Requires manual fundamental entry.'
                        };
                    }

                    if (profile.price < 100) return { ...profile, symbol: sym, status: 'DROP', reason: 'Fails Liquidity Shield: Price below ₹100.' };

                    if (selectedStrategy === 'DEMOTION' || selectedStrategy === 'FO_BAN' || selectedStrategy === 'AMAVASYA') {
                        if (profile.altman <= 1.81) return { ...profile, symbol: sym, status: 'DROP', reason: 'CRITICAL BLOCK: Altman Z-Score (<1.81) implies bankruptcy risk.' };
                    }
                    if (profile.debt >= 1.5) return { ...profile, symbol: sym, status: 'DROP', reason: 'CRITICAL BLOCK: Debt-to-Equity exceeds 1.5 multiplier.' };
                    if (profile.roe < 12.0) return { ...profile, symbol: sym, status: 'DROP', reason: 'CRITICAL BLOCK: Corporate ROE below 12% barrier.' };

                    let stopLossDistance = profile.atr * 1.5;
                    let stratNote = '';

                    switch (selectedStrategy) {
                        case 'PROMOTION':
                            stratNote = `Exit 24-hours before rebalancing at 3:20 PM.`;
                            break;
                        case 'DEMOTION':
                            stopLossDistance = profile.price * 0.03;
                            stratNote = `Trigger next-morning on a 15-Min VWAP cross.`;
                            break;
                        case 'PEAD':
                            stopLossDistance = profile.price * 0.025;
                            stratNote = `Enter above VWAP; trail with 1-Hour Supertrend (7,2).`;
                            break;
                        case 'AMAVASYA':
                            stratNote = `Trigger on Day High break. OCO target mapped to catch calculated target.`;
                            break;
                        case 'PUSHYA':
                            stratNote = `Wait for midday pullback to the 5-min VWAP or 5-EMA line.`;
                            break;
                        default:
                            stratNote = 'Strategy routing confirmed.';
                    }

                    let stopLossPrice = profile.price - stopLossDistance;
                    let targetProfitPrice = profile.price + (stopLossDistance * targetRewardMultiplier);

                    let quantity = Math.floor(maxRupeeRisk / stopLossDistance);
                    let capitalRequired = quantity * profile.price;
                    
                    if (capitalRequired > maxCapitalCap) {
                        quantity = Math.floor(maxCapitalCap / profile.price);
                        capitalRequired = quantity * profile.price;
                    }

                    return {
                        ...profile, symbol: sym, status: 'BUY', quantity, 
                        stopLoss: stopLossPrice.toFixed(2),
                        targetPrice: targetProfitPrice.toFixed(2),
                        reason: `GO AHEAD: Buy ${quantity} Shrs (Allocates ₹${(quantity * profile.price).toLocaleString('en-IN')}). Max Risk: ₹${(quantity * stopLossDistance).toFixed(0)}. ${stratNote}`
                    };
                });
                setResults(output);
                setIsProcessing(false);
            };
            const handleAddCustomTicker = (e) => {
                e.preventDefault();
                if (!customTicker.symbol) return;
                INST_DATABASE[customTicker.symbol.toUpperCase()] = {
                    price: parseFloat(customTicker.price) || 0,
                    altman: parseFloat(customTicker.altman) || 0,
                    debt: parseFloat(customTicker.debt) || 0,
                    roe: parseFloat(customTicker.roe) || 0,
                    atr: parseFloat(customTicker.atr) || (parseFloat(customTicker.price) * 0.02)
                };
                setCustomTicker({ symbol: '', price: '', altman: '', debt: '', roe: '', atr: '' });
                processEngine();
            };

            return (
                <div className="w-full max-w-7xl mx-auto p-6 space-y-6">
                    {/* RISK CONTROLS BOARD UI */}
                    <div className="bg-slate-900 border border-slate-800 rounded-lg p-5 space-y-4">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-800 pb-3">
                            <div>
                              <h1 className="text-xl font-bold text-emerald-400 font-mono tracking-tight">GLOBAL PORTFOLIO RISK CONTROL DESK</h1>
                              <p className="text-xs text-slate-400 mt-0.5">Modify parameters live below. All mathematical order sizes will instantly scale.</p>
                            </div>
                            <div className="text-xs bg-slate-950 border border-slate-800 px-3 py-1.5 rounded text-emerald-400 font-mono font-semibold mt-2 md:mt-0">
                               Max Rupee Risk Per Position: ₹{((portfolioCapital * globalRiskPct) / 100).toLocaleString('en-IN')} | Allocation Cap: ₹{((portfolioCapital * singleAssetCapPct) / 100).toLocaleString('en-IN')}
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div>
                                <label className="text-[10px] text-slate-400 uppercase tracking-wider font-semibold block mb-1">Total Trading Capital (₹)</label>
                                <input type="number" value={portfolioCapital} onChange={(e) => setPortfolioCapital(parseFloat(e.target.value) || 0)} className="w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none focus:border-emerald-500 font-mono font-bold" />
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-400 uppercase tracking-wider font-semibold block mb-1">Max Capital Allocation Per Asset (%)</label>
                                <input type="number" value={singleAssetCapPct} onChange={(e) => setSingleAssetCapPct(parseFloat(e.target.value) || 0)} className="w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none focus:border-emerald-500 font-mono" />
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-400 uppercase tracking-wider font-semibold block mb-1">Maximum Risk Tolerance Per Trade (%)</label>
                                <input type="number" step="0.1" value={globalRiskPct} onChange={(e) => setGlobalRiskPct(parseFloat(e.target.value) || 0)} className="w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none focus:border-emerald-500 font-mono" />
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-400 uppercase tracking-wider font-semibold block mb-1">Risk-to-Reward Profit Multiplier (X)</label>
                                <input type="number" step="0.1" value={targetRewardMultiplier} onChange={(e) => setTargetRewardMultiplier(parseFloat(e.target.value) || 0)} className="w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none focus:border-emerald-500 font-mono" />
                            </div>
                        </div>
                    </div>

                    <div className="bg-slate-900 border border-slate-800 rounded-lg p-4 grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
                        <div>
                            <label className="text-[10px] text-slate-400 uppercase tracking-wider block mb-1 font-semibold">Active Strategy Execution Model</label>
                            <select value={selectedStrategy} onChange={(e) => setSelectedStrategy(e.target.value)} className="w-full bg-slate-950 border border-slate-800 text-xs p-2 rounded text-emerald-400 focus:outline-none focus:border-emerald-500 font-mono">
                                {Object.keys(STRATEGIES).map(key => (
                                    <option key={key} value={key}>{STRATEGIES[key].name}</option>
                                ))}
                            </select>
                        </div>
                        <div className="md:col-span-2 bg-slate-950 p-3 rounded border border-slate-800/80 text-xs">
                            <div className="flex space-x-2 text-slate-200 font-semibold mb-0.5">
                                <span>Holding Frame:</span> <span className="text-sky-400">{STRATEGIES[selectedStrategy].timeframe}</span>
                            </div>
                            <p className="text-slate-400 leading-relaxed text-[11px]">{STRATEGIES[selectedStrategy].desc}</p>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="space-y-4 lg:col-span-1">
                            <div className="bg-slate-900 border border-slate-800 rounded-lg p-4">
                                <h2 className="text-xs font-bold uppercase tracking-wider text-slate-300 mb-2.5">1. Paste Zerodha Watchlist Dump</h2>
                                <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} className="w-full min-h-[140px] bg-slate-950 border border-slate-800 font-mono text-xs text-slate-300 p-3 rounded focus:outline-none focus:border-emerald-500" />
                                <button onClick={processEngine} disabled={isProcessing} className="w-full mt-3 bg-emerald-600 hover:bg-emerald-500 font-bold text-xs h-9 rounded text-white transition-all tracking-wide uppercase">
                                    {isProcessing ? "Processing Model Math..." : "Compile Live Funnel"}
                                </button>
                            </div>

                            <div className="bg-slate-900 border border-slate-800 rounded-lg p-4">
                                <h2 className="text-xs font-bold uppercase tracking-wider text-slate-300 mb-2.5">2. Balance Sheet Override (Screener Data)</h2>
                                <form onSubmit={handleAddCustomTicker} className="space-y-2.5">
                                    <input type="text" placeholder="Stock Ticker Symbol" value={customTicker.symbol} onChange={(e) => setCustomTicker({...customTicker, symbol: e.target.value})} className="w-full bg-slate-950 border border-slate-800 text-xs px-2.5 py-1.5 rounded text-slate-200 focus:outline-none" required />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" step="any" placeholder="Price (LTP)" value={customTicker.price} onChange={(e) => setCustomTicker({...customTicker, price: e.target.value})} className="bg-slate-950 border border-slate-800 text-xs px-2.5 py-1.5 rounded text-slate-200 focus:outline-none" required />
                                        <input type="number" step="any" placeholder="Altman Z-Score" value={customTicker.altman} onChange={(e) => setCustomTicker({...customTicker, altman: e.target.value})} className="bg-slate-950 border border-slate-800 text-xs px-2.5 py-1.5 rounded text-slate-200 focus:outline-none" required />
                                        <input type="number" step="any" placeholder="Debt-to-Equity" value={customTicker.debt} onChange={(e) => setCustomTicker({...customTicker, debt: e.target.value})} className="bg-slate-950 border border-slate-800 text-xs px-2.5 py-1.5 rounded text-slate-200 focus:outline-none" required />
                                        <input type="number" step="any" placeholder="ROE %" value={customTicker.roe} onChange={(e) => setCustomTicker({...customTicker, roe: e.target.value})} className="bg-slate-950 border border-slate-800 text-xs px-2.5 py-1.5 rounded text-slate-200 focus:outline-none" required />
                                    </div>
                                    <button type="submit" className="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs h-8 border border-slate-700 rounded uppercase font-semibold">Inject Asset Metrics</button>
                                </form>
                            </div>
                        </div>

                        <div className="lg:col-span-2">
                            <div className="bg-slate-900 border border-slate-800 rounded-lg p-4 min-h-[400px]">
                                <h2 className="text-xs font-bold uppercase tracking-wider text-slate-300 mb-3 border-b border-slate-800 pb-2">3. Risk Management & Order Execution Panel</h2>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse text-xs font-mono">
                                        <thead>
                                            <tr className="bg-slate-950 border-b border-slate-800 text-slate-400">
                                                <th className="p-3">TICKER</th>
                                                <th className="p-3">PRICE</th>
                                                <th className="p-3">STOP LOSS</th>
                                                <th className="p-3">TARGET</th>
                                                <th className="p-3">DECISION MATRIX STATUS</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/60">
                                            {results.length === 0 ? (
                                                <tr>
                                                    <td colSpan="5" className="p-12 text-center text-slate-500 font-sans">Awaiting text dump interface stream. Paste watchlists and click compile.</td>
                                                </tr>
                                            ) : (
                                                results.map((row, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-900/50 transition-colors">
                                                        <td className="p-3 font-bold text-slate-100 tracking-wider">{row.symbol}</td>
                                                        <td className="p-3 text-slate-300">₹{row.price.toLocaleString('en-IN')}</td>
                                                        <td className="p-3 text-rose-400 font-medium">{row.stopLoss ? `₹${parseFloat(row.stopLoss).toLocaleString('en-IN')}` : '-'}</td>
                                                        <td className="p-3 text-emerald-400 font-medium">{row.targetPrice ? `₹${parseFloat(row.targetPrice).toLocaleString('en-IN')}` : '-'}</td>
                                                        <td className="p-3">
                                                            <span className={`text-[10px] font-mono font-bold px-2 py-0.5 rounded block text-center max-w-[130px] ${row.status === 'BUY' ? 'bg-emerald-950 text-emerald-400 border border-emerald-800' : row.status === 'DROP' ? 'bg-rose-950 text-rose-400 border border-rose-900' : 'bg-sky-950 text-sky-400 border border-sky-900'}`}>
                                                                {row.status === 'BUY' ? "GO AHEAD / BUY" : row.status}
                                                            </span>
                                                            <p className="text-[10px] text-slate-400 mt-1.5 font-sans leading-normal">{row.reason}</p>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuantHub />);
    </script>
</body>
</html>
